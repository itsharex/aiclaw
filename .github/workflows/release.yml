name: Release Go Binary

on:
  push:
    tags:
      - "v*" # 打 v 开头的 tag 时自动运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: |
          GOOS=linux GOARCH=amd64 go build -o aiclaw-linux-amd64
          GOOS=windows GOARCH=amd64 go build -o aiclaw-windows-amd64.exe
          GOOS=darwin GOARCH=amd64 go build -o aiclaw-darwin-amd64
          GOOS=darwin GOARCH=arm64 go build -o aiclaw-darwin-arm64

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            aiclaw-linux-amd64
            aiclaw-windows-amd64.exe
            aiclaw-darwin-amd64
            aiclaw-darwin-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
